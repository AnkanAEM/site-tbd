  #         forwardHost: false        # send the backend's Host header, not www.jsw.com (verify per gateway vhost)
  #         useCache: false           # don't edge-cache API responses (see response rules below)
  #         headers:
  #           # Inject a NON-rotating gateway credential from a pipeline secret — never in the browser:
  #           client_id: "${{MULE_CLIENT_ID}}"
  #           # client_secret: "${{MULE_CLIENT_SECRET}}"   # only if MuleSoft accepts a static secret/edge key
  #     # (no rule needed for content — it falls through to the default AEM/EDS origin)

  # ── 2. CACHING — never cache writes; short TTL for reads ──
  # responseTransformations:
  #   rules:
  #     - name: no-store-api-writes
  #       when:
  #         reqProperty: path
  #         matches: "^/api/(leads|bookings)(/.*)?$"
  #       actions:
  #         - { type: set, respHeader: Cache-Control,     value: "no-store" }
  #         - { type: set, respHeader: Surrogate-Control, value: "max-age=0" }
  #     - name: short-ttl-api-reads
  #       when:
  #         reqProperty: path
  #         matches: "^/api/(dealers|inventory|slots|catalog)(/.*)?$"
  #       actions:
  #         - { type: set, respHeader: Surrogate-Control, value: "max-age=30" }

  # # ── 3. ABUSE CONTROLS — scoped to write endpoints only, NOT the content path ──
  # trafficFilters:
  #   rules:
  #     - name: rate-limit-api-writes-per-ip
  #       when:
  #         allOf:
  #           - { reqProperty: path,   matches: "^/api/(leads|bookings)(/.*)?$" }
  #           - { reqProperty: method, in: ["POST", "PATCH", "DELETE"] }
  #       rateLimit:
  #         limit: 30
  #         window: 60
  #         count: all
  #         penalty: 300
  #         groupBy:
  #           - reqProperty: clientIp
  #       action: log        # start in 'log', switch to 'block' after monitoring

  # ── 4. CANONICAL HOST & REDIRECTS ──
  redirects:
    rules:
      - name: redirect-search-to-google
        when:
          reqProperty: path
          matches: ".*/search.*"
        action:
          type: redirect
          status: 301
          location: "https://www.google.com"
      - name: apex-to-www
        when:
          reqProperty: domain
          doesNotMatch: '^www\.'
        action:
          type: redirect
          status: 301
          location:
            join:
              format: "https://www.%s%s"
              args:
                - reqProperty: domain
                - reqProperty: url
