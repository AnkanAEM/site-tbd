  #     - name: route-api-to-mulesoft
  #       when:
  #         allOf:
  #           - { reqProperty: domain, equals: "www.jsw.com" }   # always guard by domain
  #           - { reqProperty: path,   matches: "^/api/.*" }      # reserved API namespace
